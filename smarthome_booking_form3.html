let selCountry=COUNTRIES[0];

function renderList(q=''){
  const list=document.getElementById('country-list');
  list.innerHTML='';
  const f=q?COUNTRIES.filter(c=>c.n.toLowerCase().includes(q.toLowerCase())||c.c.includes(q)):COUNTRIES;
  f.forEach(c=>{
    const el=document.createElement('div');
    el.className='country-item'+(c.iso===selCountry.iso?' active':'');
    el.innerHTML='<span class="ci-flag">'+c.f+'</span><span class="ci-name">'+c.n+'</span><span class="ci-code">'+c.c+'</span>';
    el.addEventListener('click',()=>pickCountry(c));
    list.appendChild(el);
  });
}

function pickCountry(c){
  selCountry=c;
  document.getElementById('sel-flag').textContent=c.f;
  document.getElementById('sel-code').textContent=c.c;
  closeDd();
}

function closeDd(){
  document.getElementById('country-dd').classList.remove('open');
  document.getElementById('country-search').value='';
  renderList();
}

document.getElementById('country-btn').addEventListener('click',e=>{
  e.stopPropagation();
  const dd=document.getElementById('country-dd');
  dd.classList.toggle('open');
  if(dd.classList.contains('open')){
    renderList();
    setTimeout(()=>document.getElementById('country-search').focus(),50);
    const active=document.querySelector('.country-item.active');
    if(active)active.scrollIntoView({block:'center'});
  }
});

document.getElementById('country-search').addEventListener('input',e=>renderList(e.target.value));
document.addEventListener('click',e=>{if(!e.target.closest('.phone-wrap'))closeDd();});

async function detectCountry(){
  try{
    const r=await fetch('https://ipapi.co/json/');
    const d=await r.json();
    const found=COUNTRIES.find(c=>c.iso===d.country_code);
    if(found)pickCountry(found);
  }catch(e){}
}

const today=new Date();today.setHours(0,0,0,0);
const minD=new Date(today);minD.setDate(today.getDate()+1);
const maxD=new Date(today);maxD.setDate(today.getDate()+30);
let viewD=new Date(today.getFullYear(),today.getMonth(),1);
let selDate=null,selSlot=null;

function isSameDay(a,b){return a&&b&&a.toDateString()===b.toDateString();}
function isOff(d){const day=d.getDay();return d<minD||d>maxD||day===0||day===6;}
function fmtDate(d){return DAYS_L[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];}
function fmtDateISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function renderCal(){
  const y=viewD.getFullYear(),m=viewD.getMonth();
  document.getElementById('cal-title').textContent=MONTHS[m]+' '+y;
  const g=document.getElementById('cal-grid');g.innerHTML='';
  DAYS_S.forEach(d=>{const e=document.createElement('div');e.className='cal-day-name';e.textContent=d;g.appendChild(e);});
  let s=new Date(y,m,1).getDay()-1;if(s<0)s=6;
  for(let i=0;i<s;i++){const e=document.createElement('div');e.className='cal-day empty';g.appendChild(e);}
  const total=new Date(y,m+1,0).getDate();
  for(let d=1;d<=total;d++){
    const date=new Date(y,m,d);
    const e=document.createElement('div');
    e.className='cal-day'+(isOff(date)?' disabled':'')+(isSameDay(date,selDate)?' selected':'');
    e.textContent=d;
    if(!isOff(date))e.addEventListener('click',()=>pickDate(new Date(y,m,d)));
    g.appendChild(e);
  }
}

function pickDate(date){
  selDate=date;selSlot=null;
  const label=fmtDate(date);
  document.getElementById('b1').innerHTML='<strong>'+label+'</strong>';
  document.getElementById('b2').innerHTML='<strong>'+label+'</strong>';
  renderSlots();goStep(2);
}

function renderSlots(){
  renderGroup('morning-slots',MORNING);
  renderGroup('afternoon-slots',AFTERNOON);
}

function renderGroup(id,slots){
  const g=document.getElementById(id);g.innerHTML='';
  slots.forEach(s=>{
    const e=document.createElement('div');
    e.className='slot'+(s===selSlot?' selected':'');
    e.textContent=s;
    e.addEventListener('click',()=>{
      selSlot=s;
      document.querySelectorAll('.slot').forEach(b=>b.classList.remove('selected'));
      e.classList.add('selected');
      document.getElementById('b1').innerHTML='<strong>'+fmtDate(selDate)+'</strong>&nbsp;&nbsp;'+s;
      document.getElementById('b2').innerHTML='<strong>'+fmtDate(selDate)+'</strong>&nbsp;&nbsp;'+s;
      setTimeout(()=>goStep(3),200);
    });
    g.appendChild(e);
  });
}

function goStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  for(let i=1;i<=3;i++)document.getElementById('p'+i).classList.toggle('done',i<=n);
  if(n===3)checkFields();
}

function checkFields(){
  const ok=document.getElementById('nombre').value.trim()!==''&&
    document.getElementById('email').value.trim()!==''&&
    document.getElementById('telefono').value.trim()!=='';
  document.getElementById('submit-btn').disabled=!ok;
}

['nombre','email','telefono'].forEach(id=>document.getElementById(id).addEventListener('input',checkFields));
document.getElementById('prev-m').addEventListener('click',()=>{viewD=new Date(viewD.getFullYear(),viewD.getMonth()-1,1);renderCal();});
document.getElementById('next-m').addEventListener('click',()=>{viewD=new Date(viewD.getFullYear(),viewD.getMonth()+1,1);renderCal();});

async function handleSubmit(){
  const nombre=document.getElementById('nombre').value.trim();
  const email=document.getElementById('email').value.trim();
  const telefono=selCountry.c+' '+document.getElementById('telefono').value.trim();
  const fecha=fmtDateISO(selDate);
  const hora=selSlot;

  const btn=document.getElementById('submit-btn');
  const spinner=document.getElementById('spinner');
  const label=document.getElementById('btn-label');
  const errMsg=document.getElementById('error-msg');

  btn.disabled=true;
  spinner.classList.add('visible');
  label.textContent='Enviando...';
  errMsg.classList.remove('visible');

  try{
    await fetch(WEBHOOK_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},

      body:JSON.stringify({nombre,email,telefono,fecha,hora})
    });

    document.getElementById('summary').innerHTML=
      '<strong>'+nombre+'</strong>'+
      fmtDate(selDate)+' Â· '+hora+'<br>'+
      email+'<br>'+telefono;

    goStep(4);
    document.getElementById('p3').classList.add('done');

    setTimeout(()=>{
      window.location.href=REDIRECT_URL;
    },3000);

  }catch(err){
    btn.disabled=false;
    spinner.classList.remove('visible');
    label.textContent='Confirmar solicitud';
    errMsg.classList.add('visible');
  }
}

renderCal();
renderList();
detectCountry();
</script>
